name: Update Strava Progress

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-strava-progress
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update Strava progress
        run: npm run strava:update
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_TOKEN_CACHE_KEY: ${{ secrets.STRAVA_TOKEN_CACHE_KEY }}

      - name: Commit progress changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/progress.json data/strava-progress.json
          if [ -f dist/progress.json ]; then
            git add dist/progress.json
          fi
          if [ -f data/strava-token.enc ]; then
            git add data/strava-token.enc
          fi
          if git diff --cached --quiet; then
            echo "No progress changes to commit."
          else
            git commit -m "Update Strava progress"
            git push
          fi
